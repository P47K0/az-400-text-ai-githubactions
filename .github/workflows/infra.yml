name: Terraform - Infrastructure

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: ['terraform/**']
  pull_request:
    branches: [ main ]
    paths: ['terraform/**']

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # ← This is very important for OIDC

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init
        working-directory: .github/workflows/terraform

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="dockerhub_username=${{ vars.DOCKERHUB_USERNAME }}" \
            -var="cf_account_id=${{ secrets.CF_ACCOUNT_ID }}" \
            -var="cf_api_token=${{ secrets.CF_API_TOKEN }}" \
            -var="resource_group_name=${{ vars.AZURE_RESOURCE_GROUP }}"
        working-directory: .github/workflows/terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
        working-directory: .github/workflows/terraform
