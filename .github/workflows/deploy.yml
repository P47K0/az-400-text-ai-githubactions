name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'requirements.txt'
      - '.github/workflows/**'
      - 'Dockerfile*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    env:
      IMAGE_TAG: gha-${{ github.run_id }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push LLM Adapter
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/llm-adapter/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/llm-adapter:${{ env.IMAGE_TAG }}

      - name: Build and push Text Intelligence API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/text-intelligence-api/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/sentiment-api:${{ env.IMAGE_TAG }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy LLM Adapter
        run: |
          az containerapp update \
            --name llm-adapter \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ vars.DOCKERHUB_USERNAME }}/llm-adapter:${IMAGE_TAG} \
            --revision-suffix adapter-${{ github.run_number }}

      - name: Deploy Text Intelligence API
        run: |
          az containerapp update \
            --name text-intelligence-api \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ vars.DOCKERHUB_USERNAME }}/sentiment-api:${IMAGE_TAG} \
            --revision-suffix api-${{ github.run_number }}

      - name: Show API URL
        run: |
          echo "Deployment completed"
          az containerapp show \
            --name text-intelligence-api \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv
