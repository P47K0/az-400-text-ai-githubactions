name: Deploy to Azure Container Apps

on:
  workflow_dispatch:  
  
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      id-token: write

    env:
      IMAGE_TAG: gha-${{ github.run_id }}
      RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
      APP_CONFIG_ENDPOINT: ${{ vars.APP_CONFIG_ENDPOINT }}
      APP_CONFIG_LABEL: ${{ vars.APP_CONFIG_LABEL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: P47K0/sentiment-aks-ollama
          path: src

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push LLM Adapter
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/llm-adapter/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/llm-adapter:gha-${{ github.run_id }}

      - name: Build and push Text Intelligence API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/sentiment-api/Dockerfile
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/sentiment-api:gha-${{ github.run_id }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy LLM Adapter
        shell: bash
        run: |
          set -euo pipefail

          az containerapp update \
            --name llm-adapter \
            --resource-group "$RESOURCE_GROUP" \
            --image "$DOCKERHUB_USERNAME/llm-adapter:$IMAGE_TAG" \
            --revision-suffix "adapter-${{ github.run_number }}"

      - name: Deploy Text Intelligence API
        shell: bash
        run: |
          set -euo pipefail

          az containerapp update \
            --name text-intelligence-api \
            --resource-group "$RESOURCE_GROUP" \
            --image "$DOCKERHUB_USERNAME/sentiment-api:$IMAGE_TAG" \
            --revision-suffix "api-${{ github.run_number }}" \
            --set-env-vars \
              APP_CONFIG_ENDPOINT="$APP_CONFIG_ENDPOINT" \
              APP_CONFIG_LABEL="$APP_CONFIG_LABEL"

      - name: Show API URL
        shell: bash
        run: |
          set -euo pipefail

          echo "Deployment completed"
          az containerapp show \
            --name text-intelligence-api \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.configuration.ingress.fqdn" \
            -o tsv
