name: Deploy to Azure Container Apps

on:
  workflow_dispatch:        # Manual trigger
    inputs:
      image_tag:
        description: 'Image tag to deploy (e.g. latest or sha)'
        required: true
        default: 'latest'
  push:
    branches: [ main ]
    paths:
      - 'src/**'              # Trigger if you want (optional)

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy LLM Adapter
        run: |
          az containerapp update \
            --name llm-adapter \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.DOCKERHUB_USERNAME }}/llm-adapter:${{ inputs.image_tag || 'latest' }} \
            --revision-suffix "adapter-${{ github.sha }}"

      - name: Deploy Text Intelligence API
        run: |
          az containerapp update \
            --name text-intelligence-api \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-api:${{ inputs.image_tag || 'latest' }} \
            --revision-suffix "api-${{ github.sha }}"

      - name: Show URLs
        run: |
          echo "Deployment completed!"
          echo "API URL:"
          az containerapp show --name text-intelligence-api --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} --query "properties.configuration.ingress.fqdn" -o tsv
